services:
  - type: web
    name: sra-pli
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      # DB vive em Virginia (Oregon foi descontinuado). URL gerenciada manualmente
      # via painel/API do Render para evitar que o blueprint sobrescreva.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@concremat.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
